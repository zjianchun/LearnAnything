<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="PingFang SC, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2847"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="960" height="540" fill="url(#bgGrad)" rx="18"/>
  
  <!-- Title -->
  <text x="480" y="52" text-anchor="middle" fill="#f8fafc" font-size="28" font-weight="700">光合作用 · 知识结构图</text>
  
  <!-- Sun (light source) -->
  <circle cx="150" cy="150" r="50" fill="url(#sunGrad)" opacity="0.9"/>
  <text x="150" y="155" text-anchor="middle" fill="#451a03" font-size="14" font-weight="600">☀️ 光照</text>
  <!-- Sun rays -->
  <line x1="200" y1="150" x2="280" y2="200" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  <line x1="200" y1="165" x2="280" y2="230" stroke="#fbbf24" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  
  <!-- Central leaf (chloroplast) -->
  <ellipse cx="480" cy="270" rx="140" ry="90" fill="url(#leafGrad)" opacity="0.15" stroke="#22c55e" stroke-width="2"/>
  <ellipse cx="480" cy="270" rx="100" ry="60" fill="url(#leafGrad)" opacity="0.25" stroke="#16a34a" stroke-width="1.5"/>
  <text x="480" y="260" text-anchor="middle" fill="#86efac" font-size="18" font-weight="700">叶绿体</text>
  <text x="480" y="285" text-anchor="middle" fill="#bbf7d0" font-size="13">光合作用场所</text>
  
  <!-- Input: CO2 -->
  <rect x="60" y="310" width="130" height="60" rx="12" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="125" y="335" text-anchor="middle" fill="#7dd3fc" font-size="14" font-weight="600">CO₂</text>
  <text x="125" y="355" text-anchor="middle" fill="#94a3b8" font-size="11">二氧化碳(原料)</text>
  <path d="M190 340 L340 280" stroke="#38bdf8" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  
  <!-- Input: H2O -->
  <rect x="60" y="400" width="130" height="60" rx="12" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="125" y="425" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="600">H₂O</text>
  <text x="125" y="445" text-anchor="middle" fill="#94a3b8" font-size="11">水(原料)</text>
  <path d="M190 430 L360 300" stroke="#60a5fa" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  
  <!-- Output: Organic matter (glucose) -->
  <rect x="720" y="200" width="170" height="70" rx="12" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="805" y="228" text-anchor="middle" fill="#86efac" font-size="14" font-weight="600">有机物(C₆H₁₂O₆)</text>
  <text x="805" y="250" text-anchor="middle" fill="#94a3b8" font-size="11">储存能量 · 产物</text>
  <path d="M620 255 L720 235" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  
  <!-- Output: O2 -->
  <rect x="720" y="310" width="170" height="70" rx="12" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="805" y="338" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="600">O₂ 氧气</text>
  <text x="805" y="358" text-anchor="middle" fill="#94a3b8" font-size="11">释放到大气 · 产物</text>
  <path d="M620 280 L720 325" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  
  <!-- Reaction formula -->
  <rect x="280" y="380" width="400" height="50" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(148,163,184,0.3)" stroke-width="1"/>
  <text x="480" y="410" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600">CO₂ + H₂O ──光/叶绿体──→ C₆H₁₂O₆ + O₂</text>
  
  <!-- Significance boxes at bottom -->
  <rect x="120" y="470" width="200" height="50" rx="8" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1"/>
  <text x="220" y="500" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="600">🌱 有机物来源</text>
  
  <rect x="380" y="470" width="200" height="50" rx="8" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/>
  <text x="480" y="500" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">🫁 氧气来源</text>
  
  <rect x="640" y="470" width="200" height="50" rx="8" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="1"/>
  <text x="740" y="500" text-anchor="middle" fill="#86efac" font-size="12" font-weight="600">⚖️ 维持碳氧平衡</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
  </defs>
</svg>
