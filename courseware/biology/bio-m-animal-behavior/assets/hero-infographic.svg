<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#101d32"/>
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg-grad)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="200" fill="rgba(56,189,248,0.05)"/>
  <circle cx="800" cy="450" r="180" fill="rgba(167,139,250,0.05)"/>

  <!-- Title -->
  <text x="480" y="55" text-anchor="middle" fill="#eef6ff" font-size="28" font-weight="800">动物行为分类</text>
  <text x="480" y="80" text-anchor="middle" fill="#9fb4cc" font-size="14">Animal Behavior Classification</text>

  <!-- Central node -->
  <rect x="380" y="230" width="200" height="60" rx="30" fill="url(#brand-grad)" opacity="0.9"/>
  <text x="480" y="267" text-anchor="middle" fill="#07111f" font-size="18" font-weight="700">动物行为</text>

  <!-- Connecting lines -->
  <line x1="380" y1="260" x2="180" y2="160" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
  <line x1="580" y1="260" x2="780" y2="160" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  <line x1="380" y1="260" x2="150" y2="400" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
  <line x1="580" y1="260" x2="810" y2="400" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  <line x1="480" y1="290" x2="480" y2="420" stroke="#22c55e" stroke-width="2" opacity="0.5"/>

  <!-- Left branch: 先天性行为 -->
  <rect x="60" y="130" width="180" height="50" rx="14" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="150" y="160" text-anchor="middle" fill="#7dd3fc" font-size="15" font-weight="600">先天性行为</text>
  
  <!-- Sub-items left -->
  <rect x="30" y="200" width="100" height="36" rx="10" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="80" y="223" text-anchor="middle" fill="#bae6fd" font-size="12">蜘蛛织网</text>
  
  <rect x="145" y="200" width="100" height="36" rx="10" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="195" y="223" text-anchor="middle" fill="#bae6fd" font-size="12">蜜蜂跳舞</text>

  <!-- Right branch: 学习行为 -->
  <rect x="720" y="130" width="180" height="50" rx="14" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="810" y="160" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="600">学习行为</text>
  
  <!-- Sub-items right -->
  <rect x="700" y="200" width="100" height="36" rx="10" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="750" y="223" text-anchor="middle" fill="#ddd6fe" font-size="12">鹦鹉学舌</text>
  
  <rect x="815" y="200" width="110" height="36" rx="10" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="870" y="223" text-anchor="middle" fill="#ddd6fe" font-size="12">黑猩猩钓白蚁</text>

  <!-- Bottom left: 行为类型 -->
  <rect x="50" y="370" width="180" height="50" rx="14" fill="rgba(56,189,248,0.15)" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="140" y="400" text-anchor="middle" fill="#7dd3fc" font-size="15" font-weight="600">行为类型</text>
  
  <rect x="20" y="440" width="75" height="32" rx="8" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="57" y="461" text-anchor="middle" fill="#bae6fd" font-size="11">觅食</text>
  
  <rect x="105" y="440" width="75" height="32" rx="8" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="142" y="461" text-anchor="middle" fill="#bae6fd" font-size="11">防御</text>
  
  <rect x="190" y="440" width="75" height="32" rx="8" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="227" y="461" text-anchor="middle" fill="#bae6fd" font-size="11">繁殖</text>
  
  <rect x="60" y="482" width="75" height="32" rx="8" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
  <text x="97" y="503" text-anchor="middle" fill="#bae6fd" font-size="11">迁徙</text>

  <!-- Bottom center: 社会行为 -->
  <rect x="380" y="420" width="200" height="50" rx="14" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="480" y="450" text-anchor="middle" fill="#86efac" font-size="15" font-weight="600">社会行为</text>
  
  <rect x="370" y="485" width="100" height="32" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="420" y="506" text-anchor="middle" fill="#bbf7d0" font-size="11">蚂蚁分工</text>
  
  <rect x="485" y="485" width="100" height="32" rx="8" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.3)" stroke-width="1"/>
  <text x="535" y="506" text-anchor="middle" fill="#bbf7d0" font-size="11">蜜蜂等级</text>

  <!-- Bottom right: 意义 -->
  <rect x="720" y="370" width="180" height="50" rx="14" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="810" y="400" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="600">行为的意义</text>
  
  <rect x="710" y="440" width="100" height="32" rx="8" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="760" y="461" text-anchor="middle" fill="#ddd6fe" font-size="11">适应环境</text>
  
  <rect x="820" y="440" width="100" height="32" rx="8" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="870" y="461" text-anchor="middle" fill="#ddd6fe" font-size="11">种族延续</text>

  <!-- Footer -->
  <text x="480" y="530" text-anchor="middle" fill="#64748b" font-size="11">TeachAny · 初中生物八年级 · 动物学</text>
</svg>
