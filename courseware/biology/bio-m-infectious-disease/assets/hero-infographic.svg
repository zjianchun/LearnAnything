<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',system-ui,sans-serif">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#38bdf8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#07111f"/>
  <rect x="0" y="0" width="900" height="500" fill="url(#glow)" opacity="0.4"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" fill="#38bdf8" font-size="22" font-weight="bold">传染病与免疫 · 知识结构图</text>
  
  <!-- Central Node -->
  <rect x="350" y="65" width="200" height="50" rx="12" fill="#14233a" stroke="#38bdf8" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="96" text-anchor="middle" fill="#eef6ff" font-size="15" font-weight="bold">传染病与免疫</text>

  <!-- Left Branch: 传染病特点 -->
  <line x1="370" y1="115" x2="150" y2="165" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <rect x="60" y="150" width="180" height="40" rx="10" fill="#14233a" stroke="#25415f" stroke-width="1"/>
  <text x="150" y="176" text-anchor="middle" fill="#eef6ff" font-size="13" font-weight="bold">传染病的特点</text>
  
  <line x1="110" y1="190" x2="80" y2="220" stroke="#25415f" stroke-width="1"/>
  <rect x="30" y="210" width="100" height="30" rx="8" fill="#0b1628" stroke="#25415f" stroke-width="1"/>
  <text x="80" y="230" text-anchor="middle" fill="#9fb4cc" font-size="11">传染性</text>
  
  <line x1="190" y1="190" x2="210" y2="220" stroke="#25415f" stroke-width="1"/>
  <rect x="160" y="210" width="100" height="30" rx="8" fill="#0b1628" stroke="#25415f" stroke-width="1"/>
  <text x="210" y="230" text-anchor="middle" fill="#9fb4cc" font-size="11">流行性</text>

  <!-- Middle Branch: 流行三环节 -->
  <line x1="450" y1="115" x2="450" y2="165" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <rect x="340" y="165" width="220" height="40" rx="10" fill="#14233a" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="450" y="191" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">流行的三个环节</text>
  
  <line x1="380" y1="205" x2="320" y2="240" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <rect x="270" y="235" width="100" height="30" rx="8" fill="#0b1628" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <text x="320" y="255" text-anchor="middle" fill="#7dd3fc" font-size="11">传染源</text>
  
  <line x1="450" y1="205" x2="450" y2="240" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <rect x="400" y="235" width="100" height="30" rx="8" fill="#0b1628" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <text x="450" y="255" text-anchor="middle" fill="#7dd3fc" font-size="11">传播途径</text>
  
  <line x1="520" y1="205" x2="580" y2="240" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <rect x="530" y="235" width="100" height="30" rx="8" fill="#0b1628" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <text x="580" y="255" text-anchor="middle" fill="#7dd3fc" font-size="11">易感人群</text>

  <!-- Right Branch: 预防措施 -->
  <line x1="530" y1="115" x2="740" y2="165" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <rect x="650" y="150" width="200" height="40" rx="10" fill="#14233a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="750" y="176" text-anchor="middle" fill="#a78bfa" font-size="13" font-weight="bold">预防措施</text>
  
  <line x1="700" y1="190" x2="660" y2="225" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <rect x="600" y="215" width="120" height="28" rx="8" fill="#0b1628" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <text x="660" y="234" text-anchor="middle" fill="#c4b5fd" font-size="10">控制传染源</text>
  
  <line x1="750" y1="190" x2="750" y2="225" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <rect x="690" y="245" width="120" height="28" rx="8" fill="#0b1628" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <text x="750" y="264" text-anchor="middle" fill="#c4b5fd" font-size="10">切断传播途径</text>
  
  <line x1="800" y1="190" x2="840" y2="225" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <rect x="780" y="215" width="120" height="28" rx="8" fill="#0b1628" stroke="#a78bfa" stroke-width="1" opacity="0.6"/>
  <text x="840" y="234" text-anchor="middle" fill="#c4b5fd" font-size="10">保护易感人群</text>

  <!-- Bottom Left: 免疫类型 -->
  <line x1="350" y1="265" x2="200" y2="320" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
  <rect x="100" y="305" width="200" height="40" rx="10" fill="#14233a" stroke="#22c55e" stroke-width="1.5"/>
  <text x="200" y="331" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">免疫类型</text>
  
  <line x1="150" y1="345" x2="120" y2="380" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <rect x="50" y="370" width="140" height="35" rx="8" fill="#0b1628" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="120" y="391" text-anchor="middle" fill="#86efac" font-size="11">非特异性免疫</text>
  <text x="120" y="400" text-anchor="middle" fill="#6b7280" font-size="9">皮肤·黏膜·吞噬细胞</text>
  
  <line x1="250" y1="345" x2="280" y2="380" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <rect x="210" y="370" width="140" height="35" rx="8" fill="#0b1628" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="280" y="391" text-anchor="middle" fill="#86efac" font-size="11">特异性免疫</text>
  <text x="280" y="400" text-anchor="middle" fill="#6b7280" font-size="9">抗体·免疫细胞</text>

  <!-- Bottom Right: 疫苗原理 -->
  <line x1="550" y1="265" x2="680" y2="320" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <rect x="580" y="305" width="200" height="40" rx="10" fill="#14233a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="680" y="331" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">疫苗原理</text>
  
  <line x1="630" y1="345" x2="600" y2="380" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <rect x="530" y="375" width="140" height="30" rx="8" fill="#0b1628" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="600" y="395" text-anchor="middle" fill="#fcd34d" font-size="10">注入减毒抗原</text>
  
  <line x1="680" y1="345" x2="680" y2="380" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <rect x="610" y="410" width="140" height="30" rx="8" fill="#0b1628" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="680" y="430" text-anchor="middle" fill="#fcd34d" font-size="10">产生免疫记忆</text>
  
  <line x1="730" y1="345" x2="760" y2="380" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <rect x="690" y="375" width="140" height="30" rx="8" fill="#0b1628" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="760" y="395" text-anchor="middle" fill="#fcd34d" font-size="10">二次应答快速</text>

  <!-- Footer -->
  <text x="450" y="480" text-anchor="middle" fill="#4b5563" font-size="11">TeachAny · 初中生物八年级 · 人体健康</text>
</svg>
