<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" style="background:#07111f">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="28" font-weight="bold" fill="url(#grad1)">动物的主要类群 · 分类树</text>
  
  <!-- Root node -->
  <rect x="510" y="75" width="180" height="42" rx="21" fill="#14233a" stroke="#38bdf8" stroke-width="2"/>
  <text x="600" y="102" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="16" font-weight="bold" fill="#eef6ff">动物界</text>
  
  <!-- Main branches -->
  <line x1="600" y1="117" x2="600" y2="145" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  <line x1="600" y1="145" x2="300" y2="145" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  <line x1="600" y1="145" x2="900" y2="145" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
  <line x1="300" y1="145" x2="300" y2="175" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  <line x1="900" y1="145" x2="900" y2="175" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
  
  <!-- Invertebrate branch -->
  <rect x="195" y="175" width="210" height="42" rx="21" fill="#14233a" stroke="#38bdf8" stroke-width="2"/>
  <text x="300" y="202" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" font-weight="bold" fill="#7dd3fc">无脊椎动物</text>
  
  <!-- Vertebrate branch -->
  <rect x="795" y="175" width="210" height="42" rx="21" fill="#14233a" stroke="#a78bfa" stroke-width="2"/>
  <text x="900" y="202" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" font-weight="bold" fill="#c4b5fd">脊椎动物</text>
  
  <!-- Invertebrate sub-branches -->
  <line x1="300" y1="217" x2="300" y2="250" stroke="#38bdf8" stroke-width="1.5" opacity="0.5"/>
  <!-- 6 lines down -->
  <line x1="300" y1="250" x2="100" y2="250" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="250" x2="180" y2="250" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="250" x2="260" y2="250" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="250" x2="340" y2="250" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="250" x2="420" y2="250" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="300" y1="250" x2="500" y2="250" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  
  <line x1="100" y1="250" x2="100" y2="280" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="180" y1="250" x2="180" y2="280" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="260" y1="250" x2="260" y2="280" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="340" y1="250" x2="340" y2="280" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="420" y1="250" x2="420" y2="280" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  <line x1="500" y1="250" x2="500" y2="280" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Invertebrate nodes -->
  <rect x="45" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="100" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#7dd3fc">腔肠动物</text>
  <text x="100" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">水螅、珊瑚</text>
  
  <rect x="125" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="180" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#7dd3fc">扁形动物</text>
  <text x="180" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">涡虫、血吸虫</text>
  
  <rect x="205" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="260" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#7dd3fc">线形动物</text>
  <text x="260" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">蛔虫、钩虫</text>
  
  <rect x="285" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="340" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#7dd3fc">环节动物</text>
  <text x="340" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">蚯蚓、水蛭</text>
  
  <rect x="365" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="420" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#7dd3fc">软体动物</text>
  <text x="420" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">蜗牛、河蚌</text>
  
  <rect x="445" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="500" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#7dd3fc">节肢动物</text>
  <text x="500" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">昆虫、蜘蛛、虾</text>
  
  <!-- Vertebrate sub-branches -->
  <line x1="900" y1="217" x2="900" y2="250" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="900" y1="250" x2="700" y2="250" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="900" y1="250" x2="800" y2="250" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="900" y1="250" x2="900" y2="250" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="900" y1="250" x2="1000" y2="250" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="900" y1="250" x2="1100" y2="250" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  
  <line x1="700" y1="250" x2="700" y2="280" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="800" y1="250" x2="800" y2="280" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="900" y1="250" x2="900" y2="280" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="1000" y1="250" x2="1000" y2="280" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  <line x1="1100" y1="250" x2="1100" y2="280" stroke="#a78bfa" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Vertebrate nodes -->
  <rect x="645" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
  <text x="700" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd">鱼类</text>
  <text x="700" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">鳃呼吸·变温</text>
  
  <rect x="745" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
  <text x="800" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd">两栖类</text>
  <text x="800" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">幼鳃成肺·变温</text>
  
  <rect x="845" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
  <text x="900" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd">爬行类</text>
  <text x="900" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">肺呼吸·鳞甲</text>
  
  <rect x="945" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
  <text x="1000" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd">鸟类</text>
  <text x="1000" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">恒温·卵生·飞翔</text>
  
  <rect x="1045" y="280" width="110" height="56" rx="12" fill="#0b1628" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
  <text x="1100" y="303" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="13" font-weight="bold" fill="#c4b5fd">哺乳类</text>
  <text x="1100" y="323" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#9fb4cc">胎生哺乳·恒温</text>
  
  <!-- Classification criteria section -->
  <rect x="150" y="400" width="900" height="280" rx="18" fill="#101d32" stroke="#25415f" stroke-width="1"/>
  <text x="600" y="435" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="18" font-weight="bold" fill="url(#grad1)">分类依据</text>
  
  <!-- Criteria items -->
  <rect x="185" y="460" width="230" height="80" rx="10" fill="#14233a" stroke="#25415f" stroke-width="1"/>
  <text x="300" y="490" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#38bdf8">🦴 有无脊柱</text>
  <text x="300" y="515" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#9fb4cc">最根本的分类标准</text>
  <text x="300" y="532" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#64748b">无脊椎 vs 脊椎动物</text>
  
  <rect x="435" y="460" width="230" height="80" rx="10" fill="#14233a" stroke="#25415f" stroke-width="1"/>
  <text x="550" y="490" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#38bdf8">🌡️ 体温调节</text>
  <text x="550" y="515" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#9fb4cc">变温 vs 恒温</text>
  <text x="550" y="532" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#64748b">鱼/两栖/爬行变温; 鸟/哺乳恒温</text>
  
  <rect x="685" y="460" width="230" height="80" rx="10" fill="#14233a" stroke="#25415f" stroke-width="1"/>
  <text x="800" y="490" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#38bdf8">💨 呼吸方式</text>
  <text x="800" y="515" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#9fb4cc">鳃 / 皮肤 / 肺</text>
  <text x="800" y="532" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#64748b">与生活环境密切相关</text>
  
  <rect x="250" y="560" width="230" height="80" rx="10" fill="#14233a" stroke="#25415f" stroke-width="1"/>
  <text x="365" y="590" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">🥚 生殖方式</text>
  <text x="365" y="615" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#9fb4cc">卵生 vs 胎生</text>
  <text x="365" y="632" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#64748b">哺乳类胎生哺乳最高等</text>
  
  <rect x="520" y="560" width="230" height="80" rx="10" fill="#14233a" stroke="#25415f" stroke-width="1"/>
  <text x="635" y="590" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">🧥 体表覆盖</text>
  <text x="635" y="615" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#9fb4cc">裸露/鳞片/羽毛/毛发</text>
  <text x="635" y="632" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#64748b">适应环境的重要特征</text>
  
  <!-- Footer -->
  <text x="600" y="690" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="11" fill="#64748b">TeachAny · 动物的主要类群 · 初中八年级生物</text>
</svg>
