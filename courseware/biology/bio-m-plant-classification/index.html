.drag-item.dragging{opacity:.5;border-color:var(--primary);cursor:grabbing}
.drop-zones{display:flex;flex-direction:flex-column;gap:8px}
.drop-zone{background:#fff;border:2px dashed var(--border);border-radius:8px;padding:12px;min-height:70px;transition:.2s}
.drop-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.drop-zone.correct{border-color:#16a34a;background:#f0fdf4}
.drop-zone.wrong{border-color:#ef4444;background:#fef2f2}
.drop-zone h4{font-size:.78rem;font-weight:700;color:var(--primary);margin-bottom:6px}
.drop-zone .dropped{display:flex;flex-wrap:wrap;gap:4px}
.drop-zone .dropped .drag-item{font-size:.78px;padding:4px 8px;cursor:default}
.quiz-block{margin-bottom:18px}
.quiz-q{font-size:.9rem;font-weight:600;margin-bottom:10px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.quiz-opt{background:#f8f7ff;border:2px solid var(--border);border-radius:8px;padding:9px 14px;font-size:.85rem;cursor:pointer;transition:.2s;text-align:left}
.quiz-opt:hover{border-color:var(--primary);background:var(--primary-light)}
.quiz-opt.correct{border-color:#16a34a;background:#dcfce7;color:#166534;font-weight:600;pointer-events:none}
.quiz-opt.wrong{border-color:#ef4444;background:#fee2e2;color:#991b1b;pointer-events:none}
.quiz-explain{display:none;margin-top:10px;padding:10px 14px;background:#fffbeb;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:.83rem;line-height:1.6;color:var(--text)}
.kg-wrap{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:12px;margin-top:8px}
.kg-col h3{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--border)}
.kg-node{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:.82rem;margin-bottom:7px;cursor:pointer;transition:.2s;line-height:1.4}
.kg-node:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.kg-node.prereq{border-left:4px solid #94a3b8}
.kg-node.current{border-left:4px solid var(--primary);background:var(--primary-light);font-weight:600}
.kg-node.extend{border-left:4px solid var(--accent)}
.kg-node .node-title{font-weight:600;margin-bottom:2px}
.kg-node .node-desc{font-size:.75rem;color:var(--muted)}
.audio-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.audio-title{flex:1;font-size:.82rem;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.audio-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--primary);color:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
.audio-btn:hover{background:var(--primary-dark)}
.audio-progress{flex:2;height:4px;background:var(--border);border-radius:2px;cursor:pointer;position:relative;min-width:60px}
.audio-progress-fill{height:100%;background:var(--primary);border-radius:2px;width:0%;transition:width .1s linear}
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.summary-card{background:linear-gradient(135deg,var(--primary-light),#fff);border-radius:var(--radius);padding:16px;border:1px solid var(--primary-light)}
.summary-card h3{font-size:.88rem;font-weight:700;color:var(--primary);margin-bottom:8px}
.summary-card ul{padding-left:16px}
.summary-card li{font-size:.82rem;line-height:1.6;color:var(--text);margin-bottom:3px}
table{width:100%;border-collapse:collapse;font-size:.83rem;margin-top:8px}
th{background:var(--primary);color:#fff;padding:8px 10px;text-align:left;font-weight:600}
td{padding:7px 10px;border-bottom:1px solid var(--border)}
tr:nth-child(even) td{background:#f8f7ff}

.hero-cover-img {
  display: block;
  width: 100%;
  max-width: 640px;
  height: auto;
  margin: 16px auto 20px;
  border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  object-fit: contain;
}
