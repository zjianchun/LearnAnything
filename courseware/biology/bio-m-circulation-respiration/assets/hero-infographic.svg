<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background:#07111f">
  <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient></defs>
  <text x="400" y="50" text-anchor="middle" fill="#eef6ff" font-size="24" font-weight="bold">循环与呼吸综合</text>
  <!-- Heart -->
  <rect x="330" y="120" width="140" height="160" rx="20" fill="none" stroke="url(#g1)" stroke-width="2"/>
  <text x="400" y="155" text-anchor="middle" fill="#f87171" font-size="14">心脏</text>
  <line x1="365" y1="170" x2="365" y2="270" stroke="#25415f" stroke-width="1"/>
  <text x="345" y="200" text-anchor="middle" fill="#38bdf8" font-size="11">左心房</text>
  <text x="345" y="240" text-anchor="middle" fill="#38bdf8" font-size="11">左心室</text>
  <text x="435" y="200" text-anchor="middle" fill="#a78bfa" font-size="11">右心房</text>
  <text x="435" y="240" text-anchor="middle" fill="#a78bfa" font-size="11">右心室</text>
  <!-- Pulmonary circuit -->
  <path d="M 435 150 Q 550 80 400 70 Q 250 80 345 150" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="400" y="90" text-anchor="middle" fill="#a78bfa" font-size="12">肺循环</text>
  <text x="550" y="75" text-anchor="middle" fill="#9fb4cc" font-size="10">肺泡气体交换</text>
  <!-- Systemic circuit -->
  <path d="M 345 280 Q 200 350 400 370 Q 600 350 435 280" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="400" y="360" text-anchor="middle" fill="#38bdf8" font-size="12">体循环</text>
  <text x="200" y="350" text-anchor="middle" fill="#9fb4cc" font-size="10">组织气体交换</text>
  <!-- Legend -->
  <rect x="50" y="320" width="12" height="12" fill="#ef4444" rx="2"/><text x="68" y="331" fill="#9fb4cc" font-size="11">动脉血(含O₂多)</text>
  <rect x="50" y="340" width="12" height="12" fill="#6366f1" rx="2"/><text x="68" y="351" fill="#9fb4cc" font-size="11">静脉血(含CO₂多)</text>
  <text x="650" y="331" text-anchor="middle" fill="#9fb4cc" font-size="10">左心→体循环</text>
  <text x="650" y="351" text-anchor="middle" fill="#9fb4cc" font-size="10">右心→肺循环</text>
</svg>
