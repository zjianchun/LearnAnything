<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" style="background:#0f172a">
  <defs>
    <linearGradient id="kidneyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="tubeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="bladderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="24" font-weight="bold">泌尿系统结构图</text>
  <text x="400" y="70" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="14">Urinary System Structure</text>
  
  <!-- Aorta (abdominal) -->
  <path d="M400,90 L400,200" stroke="#ef4444" stroke-width="6" fill="none" opacity="0.6"/>
  <text x="420" y="150" fill="#fca5a5" font-family="system-ui" font-size="11">腹主动脉</text>
  
  <!-- Renal arteries -->
  <path d="M400,180 L310,200" stroke="#ef4444" stroke-width="4" fill="none" opacity="0.7"/>
  <path d="M400,180 L490,200" stroke="#ef4444" stroke-width="4" fill="none" opacity="0.7"/>
  
  <!-- Left Kidney -->
  <ellipse cx="280" cy="260" rx="55" ry="80" fill="url(#kidneyGrad)" stroke="#fca5a5" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="280" cy="260" rx="30" ry="45" fill="none" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="280" y="265" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="bold">肾脏</text>
  <text x="280" y="285" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="10">（左）</text>
  
  <!-- Right Kidney -->
  <ellipse cx="520" cy="260" rx="55" ry="80" fill="url(#kidneyGrad)" stroke="#fca5a5" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="520" cy="260" rx="30" ry="45" fill="none" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="520" y="265" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="bold">肾脏</text>
  <text x="520" y="285" text-anchor="middle" fill="#fecaca" font-family="system-ui" font-size="10">（右）</text>
  
  <!-- Left Ureter -->
  <path d="M280,340 C280,380 320,420 350,460" stroke="url(#tubeGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="285" y="395" fill="#fde047" font-family="system-ui" font-size="12">输尿管</text>
  
  <!-- Right Ureter -->
  <path d="M520,340 C520,380 480,420 450,460" stroke="url(#tubeGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="490" y="395" fill="#fde047" font-family="system-ui" font-size="12">输尿管</text>
  
  <!-- Bladder -->
  <ellipse cx="400" cy="490" rx="70" ry="50" fill="url(#bladderGrad)" stroke="#93c5fd" stroke-width="2" filter="url(#glow)"/>
  <text x="400" y="495" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14" font-weight="bold">膀胱</text>
  
  <!-- Urethra -->
  <path d="M400,540 L400,580" stroke="#a78bfa" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="420" y="570" fill="#c4b5fd" font-family="system-ui" font-size="12">尿道</text>
  
  <!-- Nephron Detail (inset, top-right) -->
  <rect x="590" y="90" width="190" height="200" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="685" y="112" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="bold">肾单位结构</text>
  
  <!-- Glomerulus -->
  <circle cx="650" cy="155" r="18" fill="none" stroke="#f87171" stroke-width="2"/>
  <circle cx="645" cy="150" r="4" fill="#f87171" opacity="0.6"/>
  <circle cx="655" cy="152" r="3" fill="#f87171" opacity="0.6"/>
  <circle cx="648" cy="160" r="3.5" fill="#f87171" opacity="0.6"/>
  <circle cx="656" cy="158" r="3" fill="#f87171" opacity="0.6"/>
  <text x="650" y="180" text-anchor="middle" fill="#fca5a5" font-family="system-ui" font-size="9">肾小球</text>
  
  <!-- Bowman's Capsule -->
  <path d="M630,135 C615,145 615,165 630,175 L670,175 C685,165 685,145 670,135 Z" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="710" y="158" fill="#7dd3fc" font-family="system-ui" font-size="9">肾小囊</text>
  
  <!-- Renal Tubule -->
  <path d="M650,175 C650,195 630,210 650,230 C670,250 690,240 700,260" stroke="#4ade80" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="680" y="225" fill="#86efac" font-family="system-ui" font-size="9">肾小管</text>
  
  <!-- Arrows showing flow -->
  <path d="M625,145 L620,148" stroke="#f87171" stroke-width="1.5" marker-end="none"/>
  <text x="605" y="145" fill="#94a3b8" font-family="system-ui" font-size="8">入球</text>
  <text x="605" y="170" fill="#94a3b8" font-family="system-ui" font-size="8">出球</text>
  
  <!-- Process Labels -->
  <rect x="20" y="500" width="160" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="100" y="522" text-anchor="middle" fill="#38bdf8" font-family="system-ui" font-size="11" font-weight="bold">尿液形成过程</text>
  <text x="100" y="542" text-anchor="middle" fill="#86efac" font-family="system-ui" font-size="10">① 肾小球滤过</text>
  <text x="100" y="560" text-anchor="middle" fill="#fde047" font-family="system-ui" font-size="10">② 肾小管重吸收</text>
  <text x="100" y="575" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="9">血液→原尿→终尿</text>
  
  <!-- Legend -->
  <rect x="20" y="90" width="140" height="110" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="90" y="112" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="11" font-weight="bold">图例</text>
  <circle cx="40" cy="132" r="6" fill="#ef4444" opacity="0.7"/>
  <text x="55" y="136" fill="#fca5a5" font-family="system-ui" font-size="10">肾脏（过滤器官）</text>
  <rect x="34" y="148" width="12" height="5" rx="2" fill="#f59e0b" opacity="0.7"/>
  <text x="55" y="155" fill="#fde047" font-family="system-ui" font-size="10">输尿管（输送通道）</text>
  <circle cx="40" cy="172" r="6" fill="#3b82f6" opacity="0.7"/>
  <text x="55" y="176" fill="#93c5fd" font-family="system-ui" font-size="10">膀胱（暂存尿液）</text>
  <rect x="34" y="186" width="12" height="5" rx="2" fill="#a78bfa" opacity="0.7"/>
  <text x="55" y="193" fill="#c4b5fd" font-family="system-ui" font-size="10">尿道（排出通道）</text>
</svg>
