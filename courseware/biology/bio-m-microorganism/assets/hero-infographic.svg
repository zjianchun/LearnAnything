<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bacteriaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="fungiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="virusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="960" height="540" fill="url(#bgGrad)"/>
  
  <!-- Grid lines -->
  <g stroke="#25415f" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="135" x2="960" y2="135"/>
    <line x1="0" y1="270" x2="960" y2="270"/>
    <line x1="0" y1="405" x2="960" y2="405"/>
    <line x1="320" y1="0" x2="320" y2="540"/>
    <line x1="640" y1="0" x2="640" y2="540"/>
  </g>
  
  <!-- Title -->
  <text x="480" y="60" text-anchor="middle" fill="#eef6ff" font-size="28" font-weight="bold" font-family="PingFang SC, sans-serif">微生物三大类群对比</text>
  <text x="480" y="90" text-anchor="middle" fill="#9fb4cc" font-size="14" font-family="PingFang SC, sans-serif">Bacteria · Fungi · Virus</text>
  
  <!-- Bacteria Section -->
  <g transform="translate(160, 280)">
    <!-- Cell shape -->
    <ellipse cx="0" cy="-20" rx="65" ry="35" fill="url(#bacteriaGrad)" stroke="#22c55e" stroke-width="2" filter="url(#glow)"/>
    <!-- Flagellum -->
    <path d="M 60 -10 Q 90 -30 110 -5 Q 130 20 155 0" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.7"/>
    <!-- DNA region -->
    <ellipse cx="-5" cy="-20" rx="18" ry="12" fill="none" stroke="#86efac" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="0" y="-18" text-anchor="middle" fill="#86efac" font-size="8">DNA</text>
    <!-- Label -->
    <text x="0" y="50" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="bold" font-family="PingFang SC, sans-serif">细菌</text>
    <text x="0" y="72" text-anchor="middle" fill="#9fb4cc" font-size="12" font-family="PingFang SC, sans-serif">单细胞·无核膜</text>
    <text x="0" y="92" text-anchor="middle" fill="#9fb4cc" font-size="12" font-family="PingFang SC, sans-serif">分裂生殖</text>
    <!-- Features -->
    <rect x="-75" y="105" width="150" height="28" rx="14" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
    <text x="0" y="124" text-anchor="middle" fill="#86efac" font-size="11" font-family="PingFang SC, sans-serif">有细胞壁·无成形细胞核</text>
  </g>
  
  <!-- Fungi Section -->
  <g transform="translate(480, 280)">
    <!-- Mushroom shape -->
    <ellipse cx="0" cy="-45" rx="40" ry="22" fill="url(#fungiGrad)" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
    <rect x="-8" y="-25" width="16" height="40" rx="4" fill="#d97706" stroke="#f59e0b" stroke-width="1.5"/>
    <!-- Hyphae -->
    <path d="M -8 15 Q -25 30 -35 25" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <path d="M 8 15 Q 25 30 35 25" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>
    <!-- Spores -->
    <circle cx="-20" cy="-55" r="3" fill="#fde68a" opacity="0.6"/>
    <circle cx="15" cy="-60" r="2.5" fill="#fde68a" opacity="0.5"/>
    <circle cx="30" cy="-48" r="2" fill="#fde68a" opacity="0.4"/>
    <!-- Label -->
    <text x="0" y="50" text-anchor="middle" fill="#f59e0b" font-size="20" font-weight="bold" font-family="PingFang SC, sans-serif">真菌</text>
    <text x="0" y="72" text-anchor="middle" fill="#9fb4cc" font-size="12" font-family="PingFang SC, sans-serif">有核膜·孢子生殖</text>
    <text x="0" y="92" text-anchor="middle" fill="#9fb4cc" font-size="12" font-family="PingFang SC, sans-serif">酵母菌/霉菌/蘑菇</text>
    <!-- Features -->
    <rect x="-75" y="105" width="150" height="28" rx="14" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1"/>
    <text x="0" y="124" text-anchor="middle" fill="#fde68a" font-size="11" font-family="PingFang SC, sans-serif">有成形细胞核·异养</text>
  </g>
  
  <!-- Virus Section -->
  <g transform="translate(800, 280)">
    <!-- Icosahedral shape -->
    <polygon points="0,-40 35,-20 35,15 0,35 -35,15 -35,-20" fill="url(#virusGrad)" stroke="#ef4444" stroke-width="2" filter="url(#glow)"/>
    <!-- Spikes -->
    <line x1="0" y1="-40" x2="0" y2="-55" stroke="#fca5a5" stroke-width="2"/>
    <circle cx="0" cy="-58" r="3" fill="#fca5a5"/>
    <line x1="35" y1="-20" x2="48" y2="-28" stroke="#fca5a5" stroke-width="2"/>
    <circle cx="51" cy="-30" r="3" fill="#fca5a5"/>
    <line x1="35" y1="15" x2="48" y2="22" stroke="#fca5a5" stroke-width="2"/>
    <circle cx="51" cy="24" r="3" fill="#fca5a5"/>
    <line x1="-35" y1="-20" x2="-48" y2="-28" stroke="#fca5a5" stroke-width="2"/>
    <circle cx="-51" cy="-30" r="3" fill="#fca5a5"/>
    <line x1="-35" y1="15" x2="-48" y2="22" stroke="#fca5a5" stroke-width="2"/>
    <circle cx="-51" cy="24" r="3" fill="#fca5a5"/>
    <!-- Inner nucleic acid -->
    <path d="M -10 -15 Q 0 -5 10 -15 Q 15 -5 5 5 Q -5 10 -10 0 Q -15 -5 -10 -15" fill="none" stroke="#fca5a5" stroke-width="1.5" opacity="0.7"/>
    <text x="0" y="0" text-anchor="middle" fill="#fca5a5" font-size="7">RNA/DNA</text>
    <!-- Label -->
    <text x="0" y="55" text-anchor="middle" fill="#ef4444" font-size="20" font-weight="bold" font-family="PingFang SC, sans-serif">病毒</text>
    <text x="0" y="77" text-anchor="middle" fill="#9fb4cc" font-size="12" font-family="PingFang SC, sans-serif">无细胞结构</text>
    <text x="0" y="97" text-anchor="middle" fill="#9fb4cc" font-size="12" font-family="PingFang SC, sans-serif">专性寄生·复制增殖</text>
    <!-- Features -->
    <rect x="-75" y="105" width="150" height="28" rx="14" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1"/>
    <text x="0" y="124" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="PingFang SC, sans-serif">蛋白质外壳+核酸</text>
  </g>
  
  <!-- Comparison arrows -->
  <g stroke="#38bdf8" stroke-width="1.5" opacity="0.4" stroke-dasharray="5,3">
    <line x1="250" y1="260" x2="390" y2="260"/>
    <line x1="570" y1="260" x2="710" y2="260"/>
  </g>
  
  <!-- Bottom comparison bar -->
  <rect x="80" y="460" width="800" height="55" rx="12" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.25)" stroke-width="1"/>
  <text x="200" y="485" text-anchor="middle" fill="#86efac" font-size="12" font-family="PingFang SC, sans-serif">✓ 有细胞结构</text>
  <text x="200" y="503" text-anchor="middle" fill="#86efac" font-size="11" font-family="PingFang SC, sans-serif">原核生物</text>
  <text x="480" y="485" text-anchor="middle" fill="#fde68a" font-size="12" font-family="PingFang SC, sans-serif">✓ 有细胞结构</text>
  <text x="480" y="503" text-anchor="middle" fill="#fde68a" font-size="11" font-family="PingFang SC, sans-serif">真核生物</text>
  <text x="760" y="485" text-anchor="middle" fill="#fca5a5" font-size="12" font-family="PingFang SC, sans-serif">✗ 无细胞结构</text>
  <text x="760" y="503" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="PingFang SC, sans-serif">非细胞生物</text>
</svg>
