<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" fill="url(#bg-grad)"/>

  <!-- Decorative circles -->
  <circle cx="120" cy="80" r="60" fill="#38bdf8" opacity="0.06"/>
  <circle cx="850" cy="450" r="80" fill="#a78bfa" opacity="0.05"/>

  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" fill="url(#brand-grad)" font-size="28" font-weight="800">细胞基础 · 知识结构图</text>

  <!-- Central node: 细胞 -->
  <ellipse cx="480" cy="270" rx="80" ry="45" fill="#14233a" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow)"/>
  <text x="480" y="264" text-anchor="middle" fill="#38bdf8" font-size="20" font-weight="700">细胞</text>
  <text x="480" y="286" text-anchor="middle" fill="#9fb4cc" font-size="12">生命活动的基本单位</text>

  <!-- Branch 1: 细胞的发现 (top-left) -->
  <line x1="420" y1="240" x2="200" y2="140" stroke="#38bdf8" stroke-width="1.5" opacity="0.6" stroke-dasharray="4 2"/>
  <rect x="110" y="100" width="180" height="80" rx="14" fill="#14233a" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="200" y="130" text-anchor="middle" fill="#38bdf8" font-size="15" font-weight="600">细胞的发现</text>
  <text x="200" y="152" text-anchor="middle" fill="#9fb4cc" font-size="11">1665年 罗伯特·胡克</text>
  <text x="200" y="170" text-anchor="middle" fill="#9fb4cc" font-size="11">软木薄片 · 命名cell</text>

  <!-- Branch 2: 细胞学说 (top-right) -->
  <line x1="540" y1="240" x2="760" y2="140" stroke="#a78bfa" stroke-width="1.5" opacity="0.6" stroke-dasharray="4 2"/>
  <rect x="670" y="100" width="180" height="80" rx="14" fill="#14233a" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
  <text x="760" y="130" text-anchor="middle" fill="#a78bfa" font-size="15" font-weight="600">细胞学说</text>
  <text x="760" y="152" text-anchor="middle" fill="#9fb4cc" font-size="11">施莱登 &amp; 施旺</text>
  <text x="760" y="170" text-anchor="middle" fill="#9fb4cc" font-size="11">所有生物由细胞组成</text>

  <!-- Branch 3: 动物细胞 (bottom-left) -->
  <line x1="430" y1="305" x2="230" y2="410" stroke="#22c55e" stroke-width="1.5" opacity="0.6" stroke-dasharray="4 2"/>
  <rect x="130" y="380" width="200" height="100" rx="14" fill="#14233a" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="230" y="410" text-anchor="middle" fill="#22c55e" font-size="15" font-weight="600">动物细胞</text>
  <text x="230" y="432" text-anchor="middle" fill="#9fb4cc" font-size="11">✓ 细胞膜</text>
  <text x="230" y="450" text-anchor="middle" fill="#9fb4cc" font-size="11">✓ 细胞质</text>
  <text x="230" y="468" text-anchor="middle" fill="#9fb4cc" font-size="11">✓ 细胞核</text>

  <!-- Branch 4: 植物细胞 (bottom-right) -->
  <line x1="530" y1="305" x2="730" y2="410" stroke="#f59e0b" stroke-width="1.5" opacity="0.6" stroke-dasharray="4 2"/>
  <rect x="630" y="380" width="200" height="100" rx="14" fill="#14233a" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <text x="730" y="410" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="600">植物细胞</text>
  <text x="730" y="432" text-anchor="middle" fill="#9fb4cc" font-size="11">✓ 细胞壁 (额外)</text>
  <text x="730" y="450" text-anchor="middle" fill="#9fb4cc" font-size="11">✓ 叶绿体 (额外)</text>
  <text x="730" y="468" text-anchor="middle" fill="#9fb4cc" font-size="11">✓ 液泡 (额外)</text>

  <!-- Branch 5: 前置知识 (left) -->
  <line x1="400" y1="270" x2="130" y2="270" stroke="#64748b" stroke-width="1" opacity="0.5" stroke-dasharray="3 3"/>
  <rect x="20" y="245" width="120" height="50" rx="10" fill="#0d1b2a" stroke="#64748b" stroke-width="1" opacity="0.7"/>
  <text x="80" y="268" text-anchor="middle" fill="#64748b" font-size="11">前置课</text>
  <text x="80" y="284" text-anchor="middle" fill="#64748b" font-size="10">显微镜的使用</text>

  <!-- Branch 6: 后续知识 (right) -->
  <line x1="560" y1="270" x2="830" y2="270" stroke="#64748b" stroke-width="1" opacity="0.5" stroke-dasharray="3 3"/>
  <rect x="820" y="245" width="120" height="50" rx="10" fill="#0d1b2a" stroke="#64748b" stroke-width="1" opacity="0.7"/>
  <text x="880" y="268" text-anchor="middle" fill="#64748b" font-size="11">后续课</text>
  <text x="880" y="284" text-anchor="middle" fill="#64748b" font-size="10">细胞的结构</text>

  <!-- Connection between animal and plant -->
  <path d="M330 430 Q480 500 630 430" fill="none" stroke="#9fb4cc" stroke-width="1" opacity="0.3" stroke-dasharray="2 2"/>
  <text x="480" y="490" text-anchor="middle" fill="#9fb4cc" font-size="10" opacity="0.7">共有结构 vs 特有结构</text>

  <!-- Footer -->
  <text x="480" y="530" text-anchor="middle" fill="#64748b" font-size="11">TeachAny · 初中生物七年级 · 细胞生物学</text>
</svg>
