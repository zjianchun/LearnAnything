<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" style="background:#07111f">
  <defs>
    <linearGradient id="gBrand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="gYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background decorations -->
  <circle cx="120" cy="100" r="180" fill="rgba(56,189,248,0.05)"/>
  <circle cx="840" cy="440" r="160" fill="rgba(167,139,250,0.05)"/>
  
  <!-- Title -->
  <text x="480" y="50" text-anchor="middle" fill="#eef6ff" font-family="system-ui,sans-serif" font-size="28" font-weight="bold">微生物与人类健康 · 知识结构图</text>
  
  <!-- Central node -->
  <rect x="380" y="230" width="200" height="60" rx="30" fill="url(#gBrand)" opacity="0.9"/>
  <text x="480" y="267" text-anchor="middle" fill="#07111f" font-family="system-ui,sans-serif" font-size="18" font-weight="bold">微生物</text>
  
  <!-- Branch 1: 有益微生物 (left-top) -->
  <line x1="380" y1="250" x2="200" y2="140" stroke="#22c55e" stroke-width="2" opacity="0.6"/>
  <rect x="100" y="110" width="200" height="50" rx="25" fill="url(#gGreen)" opacity="0.85"/>
  <text x="200" y="141" text-anchor="middle" fill="#07111f" font-family="system-ui,sans-serif" font-size="15" font-weight="bold">有益微生物</text>
  
  <!-- Sub-nodes of 有益微生物 -->
  <rect x="30" y="175" width="100" height="36" rx="18" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1"/>
  <text x="80" y="198" text-anchor="middle" fill="#4ade80" font-family="system-ui,sans-serif" font-size="12">发酵</text>
  
  <rect x="145" y="175" width="100" height="36" rx="18" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1"/>
  <text x="195" y="198" text-anchor="middle" fill="#4ade80" font-family="system-ui,sans-serif" font-size="12">分解</text>
  
  <rect x="260" y="175" width="100" height="36" rx="18" fill="rgba(34,197,94,0.2)" stroke="#22c55e" stroke-width="1"/>
  <text x="310" y="198" text-anchor="middle" fill="#4ade80" font-family="system-ui,sans-serif" font-size="12">共生</text>
  
  <!-- Branch 2: 有害微生物 (right-top) -->
  <line x1="580" y1="250" x2="760" y2="140" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <rect x="660" y="110" width="200" height="50" rx="25" fill="url(#gRed)" opacity="0.85"/>
  <text x="760" y="141" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="15" font-weight="bold">有害微生物</text>
  
  <!-- Sub-nodes of 有害微生物 -->
  <rect x="640" y="175" width="100" height="36" rx="18" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
  <text x="690" y="198" text-anchor="middle" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="12">致病菌</text>
  
  <rect x="760" y="175" width="100" height="36" rx="18" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
  <text x="810" y="198" text-anchor="middle" fill="#fca5a5" font-family="system-ui,sans-serif" font-size="12">病毒</text>
  
  <!-- Branch 3: 抗生素与耐药性 (left-bottom) -->
  <line x1="400" y1="290" x2="200" y2="380" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
  <rect x="80" y="360" width="240" height="50" rx="25" fill="url(#gYellow)" opacity="0.85"/>
  <text x="200" y="391" text-anchor="middle" fill="#07111f" font-family="system-ui,sans-serif" font-size="15" font-weight="bold">抗生素与耐药性</text>
  
  <!-- Sub-nodes -->
  <rect x="60" y="425" width="110" height="36" rx="18" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
  <text x="115" y="448" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="12">自然选择</text>
  
  <rect x="185" y="425" width="110" height="36" rx="18" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
  <text x="240" y="448" text-anchor="middle" fill="#fbbf24" font-family="system-ui,sans-serif" font-size="12">合理用药</text>
  
  <!-- Branch 4: 益生菌与肠道健康 (center-bottom) -->
  <line x1="480" y1="290" x2="480" y2="370" stroke="#a78bfa" stroke-width="2" opacity="0.6"/>
  <rect x="360" y="370" width="240" height="50" rx="25" fill="rgba(167,139,250,0.85)" />
  <text x="480" y="401" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="15" font-weight="bold">益生菌与肠道健康</text>
  
  <!-- Sub-nodes -->
  <rect x="370" y="435" width="100" height="36" rx="18" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="420" y="458" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="12">菌群平衡</text>
  
  <rect x="490" y="435" width="100" height="36" rx="18" fill="rgba(167,139,250,0.2)" stroke="#a78bfa" stroke-width="1"/>
  <text x="540" y="458" text-anchor="middle" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="12">益生元</text>
  
  <!-- Branch 5: 工业应用 (right-bottom) -->
  <line x1="560" y1="290" x2="760" y2="380" stroke="#38bdf8" stroke-width="2" opacity="0.6"/>
  <rect x="640" y="360" width="240" height="50" rx="25" fill="rgba(56,189,248,0.85)"/>
  <text x="760" y="391" text-anchor="middle" fill="#07111f" font-family="system-ui,sans-serif" font-size="15" font-weight="bold">工业应用</text>
  
  <!-- Sub-nodes -->
  <rect x="640" y="425" width="80" height="36" rx="18" fill="rgba(56,189,248,0.2)" stroke="#38bdf8" stroke-width="1"/>
  <text x="680" y="448" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="12">酿酒</text>
  
  <rect x="730" y="425" width="80" height="36" rx="18" fill="rgba(56,189,248,0.2)" stroke="#38bdf8" stroke-width="1"/>
  <text x="770" y="448" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="12">制药</text>
  
  <rect x="820" y="425" width="80" height="36" rx="18" fill="rgba(56,189,248,0.2)" stroke="#38bdf8" stroke-width="1"/>
  <text x="860" y="448" text-anchor="middle" fill="#7dd3fc" font-family="system-ui,sans-serif" font-size="12">环保</text>
  
  <!-- Decorative bacteria shapes -->
  <ellipse cx="50" cy="60" rx="18" ry="10" fill="rgba(34,197,94,0.3)" transform="rotate(-20 50 60)"/>
  <ellipse cx="910" cy="80" rx="15" ry="8" fill="rgba(239,68,68,0.3)" transform="rotate(15 910 80)"/>
  <circle cx="900" cy="500" r="12" fill="rgba(167,139,250,0.2)"/>
  <circle cx="60" cy="500" r="10" fill="rgba(56,189,248,0.2)"/>
  
  <!-- Footer -->
  <text x="480" y="525" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">TeachAny · 初中生物八年级 · 微生物学</text>
</svg>
