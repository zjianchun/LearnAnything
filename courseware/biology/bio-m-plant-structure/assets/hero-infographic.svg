<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="rgba(56,189,248,0.05)"/>
  <circle cx="1050" cy="600" r="120" fill="rgba(167,139,250,0.04)"/>
  
  <!-- Title -->
  <text x="600" y="55" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="32" font-weight="bold" fill="#eef6ff">绿色植物的整体结构</text>
  <text x="600" y="82" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#9fb4cc">Overall Structure of Green Plants — 六大器官与功能协调</text>
  
  <!-- Central plant illustration -->
  <!-- Roots -->
  <path d="M600,580 Q580,620 560,650 M600,580 Q600,630 600,660 M600,580 Q620,620 640,650 M600,580 Q570,610 545,640 M600,580 Q630,610 655,640" stroke="#a78bfa" stroke-width="3" fill="none" opacity="0.9"/>
  
  <!-- Stem -->
  <rect x="594" y="300" width="12" height="280" rx="6" fill="url(#stemGrad)" opacity="0.9"/>
  
  <!-- Branches -->
  <path d="M600,420 Q540,400 480,380" stroke="#22c55e" stroke-width="4" fill="none"/>
  <path d="M600,420 Q660,400 720,380" stroke="#22c55e" stroke-width="4" fill="none"/>
  <path d="M600,350 Q540,330 490,320" stroke="#22c55e" stroke-width="3" fill="none"/>
  <path d="M600,350 Q660,330 710,320" stroke="#22c55e" stroke-width="3" fill="none"/>
  
  <!-- Leaves -->
  <ellipse cx="460" cy="370" rx="40" ry="20" fill="#22c55e" opacity="0.8" transform="rotate(-15,460,370)"/>
  <ellipse cx="740" cy="370" rx="40" ry="20" fill="#22c55e" opacity="0.8" transform="rotate(15,740,370)"/>
  <ellipse cx="470" cy="310" rx="35" ry="18" fill="#16a34a" opacity="0.8" transform="rotate(-10,470,310)"/>
  <ellipse cx="730" cy="310" rx="35" ry="18" fill="#16a34a" opacity="0.8" transform="rotate(10,730,310)"/>
  
  <!-- Flower -->
  <circle cx="600" cy="260" r="8" fill="#fbbf24"/>
  <ellipse cx="600" cy="240" rx="12" ry="18" fill="#f472b6" opacity="0.9"/>
  <ellipse cx="585" cy="252" rx="12" ry="18" fill="#f472b6" opacity="0.8" transform="rotate(-30,585,252)"/>
  <ellipse cx="615" cy="252" rx="12" ry="18" fill="#f472b6" opacity="0.8" transform="rotate(30,615,252)"/>
  <ellipse cx="588" cy="270" rx="12" ry="18" fill="#f472b6" opacity="0.7" transform="rotate(-60,588,270)"/>
  <ellipse cx="612" cy="270" rx="12" ry="18" fill="#f472b6" opacity="0.7" transform="rotate(60,612,270)"/>
  
  <!-- Fruit -->
  <ellipse cx="720" cy="430" rx="22" ry="28" fill="#ef4444" opacity="0.85"/>
  <path d="M720,402 Q725,395 730,400" stroke="#22c55e" stroke-width="2" fill="none"/>
  
  <!-- Seed (inside fruit indicator) -->
  <ellipse cx="720" cy="435" rx="6" ry="8" fill="#fbbf24" opacity="0.7"/>
  
  <!-- Labels with connecting lines -->
  <!-- Root label -->
  <line x1="600" y1="620" x2="820" y2="640" stroke="rgba(167,139,250,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="820" y="625" width="120" height="36" rx="18" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.4)" stroke-width="1.5"/>
  <text x="880" y="649" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#a78bfa" font-weight="bold">根 Root</text>
  
  <!-- Stem label -->
  <line x1="606" y1="460" x2="820" y2="510" stroke="rgba(56,189,248,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="820" y="495" width="120" height="36" rx="18" fill="rgba(56,189,248,0.15)" stroke="rgba(56,189,248,0.4)" stroke-width="1.5"/>
  <text x="880" y="519" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#38bdf8" font-weight="bold">茎 Stem</text>
  
  <!-- Leaf label -->
  <line x1="460" y1="370" x2="260" y2="380" stroke="rgba(34,197,94,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="140" y="365" width="120" height="36" rx="18" fill="rgba(34,197,94,0.15)" stroke="rgba(34,197,94,0.4)" stroke-width="1.5"/>
  <text x="200" y="389" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#22c55e" font-weight="bold">叶 Leaf</text>
  
  <!-- Flower label -->
  <line x1="600" y1="240" x2="380" y2="200" stroke="rgba(244,114,182,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="260" y="185" width="120" height="36" rx="18" fill="rgba(244,114,182,0.15)" stroke="rgba(244,114,182,0.4)" stroke-width="1.5"/>
  <text x="320" y="209" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#f472b6" font-weight="bold">花 Flower</text>
  
  <!-- Fruit label -->
  <line x1="742" y1="430" x2="900" y2="400" stroke="rgba(239,68,68,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="900" y="385" width="140" height="36" rx="18" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
  <text x="970" y="409" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#ef4444" font-weight="bold">果实 Fruit</text>
  
  <!-- Seed label -->
  <line x1="720" y1="455" x2="900" y2="460" stroke="rgba(251,191,36,0.5)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="900" y="445" width="140" height="36" rx="18" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
  <text x="970" y="469" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="15" fill="#fbbf24" font-weight="bold">种子 Seed</text>
  
  <!-- Category boxes at bottom -->
  <!-- Vegetative organs -->
  <rect x="100" y="490" width="280" height="100" rx="16" fill="rgba(56,189,248,0.08)" stroke="rgba(56,189,248,0.3)" stroke-width="2"/>
  <text x="240" y="520" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="18" fill="#38bdf8" font-weight="bold">营养器官</text>
  <text x="240" y="545" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9fb4cc">Vegetative Organs</text>
  <text x="240" y="572" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" fill="#eef6ff">根 · 茎 · 叶</text>
  <text x="240" y="592" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#9fb4cc">吸收、运输、光合作用</text>
  
  <!-- Reproductive organs -->
  <rect x="820" y="490" width="280" height="100" rx="16" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.3)" stroke-width="2"/>
  <text x="960" y="520" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="18" fill="#a78bfa" font-weight="bold">生殖器官</text>
  <text x="960" y="545" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#9fb4cc">Reproductive Organs</text>
  <text x="960" y="572" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="14" fill="#eef6ff">花 · 果实 · 种子</text>
  <text x="960" y="592" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#9fb4cc">传粉、受精、繁殖后代</text>
  
  <!-- Coordination arrow -->
  <path d="M385,540 Q600,530 815,540" stroke="url(#brandGrad)" stroke-width="2" fill="none" marker-end="url(#arrowEnd)" opacity="0.6"/>
  <defs>
    <marker id="arrowEnd" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8" fill="none" stroke="url(#brandGrad)" stroke-width="1.5"/>
    </marker>
  </defs>
  <text x="600" y="525" text-anchor="middle" font-family="PingFang SC, sans-serif" font-size="12" fill="#9fb4cc">功能协调 · 物质与能量流动</text>
  
  <!-- Footer -->
  <text x="600" y="685" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#475569">TeachAny · bio-m-plant-structure · 初中七年级生物</text>
</svg>
