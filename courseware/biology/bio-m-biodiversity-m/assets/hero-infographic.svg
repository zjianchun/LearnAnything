<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="-apple-system,BlinkMacSystemFont,'PingFang SC',system-ui,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="680" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#38bdf8" opacity="0.03"/>
  <circle cx="1100" cy="580" r="180" fill="#a78bfa" opacity="0.04"/>
  <circle cx="600" cy="340" r="300" fill="#38bdf8" opacity="0.02"/>
  
  <!-- Title -->
  <text x="600" y="60" text-anchor="middle" fill="url(#brandGrad)" font-size="28" font-weight="800">生物多样性及其保护 · 知识结构图</text>
  
  <!-- Central node -->
  <rect x="440" y="90" width="320" height="60" rx="30" fill="#38bdf8" opacity="0.15" stroke="#38bdf8" stroke-width="2"/>
  <text x="600" y="128" text-anchor="middle" fill="#38bdf8" font-size="20" font-weight="700" filter="url(#glow)">生物多样性</text>
  
  <!-- Branch 1: Three Levels -->
  <line x1="500" y1="150" x2="200" y2="220" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
  <rect x="60" y="195" width="280" height="50" rx="14" fill="#14233a" stroke="#38bdf8" stroke-width="1.5" opacity="0.8"/>
  <text x="200" y="226" text-anchor="middle" fill="#eef6ff" font-size="16" font-weight="600">三个层次</text>
  
  <!-- Sub-nodes for Three Levels -->
  <line x1="200" y1="245" x2="100" y2="290" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="245" x2="200" y2="290" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="245" x2="300" y2="290" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  
  <rect x="30" y="285" width="140" height="40" rx="10" fill="#0b1628" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <text x="100" y="310" text-anchor="middle" fill="#7dd3fc" font-size="13">基因多样性</text>
  
  <rect x="130" y="285" width="140" height="40" rx="10" fill="#0b1628" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <text x="200" y="310" text-anchor="middle" fill="#7dd3fc" font-size="13">物种多样性</text>
  
  <rect x="230" y="285" width="160" height="40" rx="10" fill="#0b1628" stroke="#38bdf8" stroke-width="1" opacity="0.7"/>
  <text x="310" y="310" text-anchor="middle" fill="#7dd3fc" font-size="13">生态系统多样性</text>
  
  <!-- Branch 2: Value -->
  <line x1="700" y1="150" x2="1000" y2="220" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <rect x="860" y="195" width="280" height="50" rx="14" fill="#14233a" stroke="#a78bfa" stroke-width="1.5" opacity="0.8"/>
  <text x="1000" y="226" text-anchor="middle" fill="#eef6ff" font-size="16" font-weight="600">价值</text>
  
  <!-- Sub-nodes for Value -->
  <line x1="1000" y1="245" x2="900" y2="290" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <line x1="1000" y1="245" x2="1000" y2="290" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  <line x1="1000" y1="245" x2="1100" y2="290" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
  
  <rect x="840" y="285" width="120" height="40" rx="10" fill="#0b1628" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <text x="900" y="310" text-anchor="middle" fill="#c4b5fd" font-size="13">直接价值</text>
  
  <rect x="940" y="285" width="120" height="40" rx="10" fill="#0b1628" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <text x="1000" y="310" text-anchor="middle" fill="#c4b5fd" font-size="13">间接价值</text>
  
  <rect x="1040" y="285" width="120" height="40" rx="10" fill="#0b1628" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
  <text x="1100" y="310" text-anchor="middle" fill="#c4b5fd" font-size="13">潜在价值</text>
  
  <!-- Branch 3: Threats -->
  <line x1="500" y1="150" x2="250" y2="390" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
  <rect x="100" y="375" width="300" height="50" rx="14" fill="#14233a" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
  <text x="250" y="406" text-anchor="middle" fill="#eef6ff" font-size="16" font-weight="600">面临的威胁</text>
  
  <!-- Sub-nodes for Threats -->
  <line x1="150" y1="425" x2="100" y2="470" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <line x1="220" y1="425" x2="220" y2="470" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <line x1="290" y1="425" x2="340" y2="470" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  <line x1="350" y1="425" x2="460" y2="470" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>
  
  <rect x="30" y="465" width="140" height="40" rx="10" fill="#0b1628" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <text x="100" y="490" text-anchor="middle" fill="#fcd34d" font-size="12">栖息地破坏</text>
  
  <rect x="150" y="465" width="140" height="40" rx="10" fill="#0b1628" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <text x="220" y="490" text-anchor="middle" fill="#fcd34d" font-size="12">外来物种入侵</text>
  
  <rect x="270" y="465" width="140" height="40" rx="10" fill="#0b1628" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <text x="340" y="490" text-anchor="middle" fill="#fcd34d" font-size="12">过度捕猎</text>
  
  <rect x="390" y="465" width="140" height="40" rx="10" fill="#0b1628" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
  <text x="460" y="490" text-anchor="middle" fill="#fcd34d" font-size="12">环境污染</text>
  
  <!-- Branch 4: Conservation -->
  <line x1="700" y1="150" x2="950" y2="390" stroke="#22c55e" stroke-width="1.5" opacity="0.6"/>
  <rect x="800" y="375" width="300" height="50" rx="14" fill="#14233a" stroke="#22c55e" stroke-width="1.5" opacity="0.8"/>
  <text x="950" y="406" text-anchor="middle" fill="#eef6ff" font-size="16" font-weight="600">保护措施</text>
  
  <!-- Sub-nodes for Conservation -->
  <line x1="880" y1="425" x2="830" y2="470" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <line x1="950" y1="425" x2="950" y2="470" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <line x1="1020" y1="425" x2="1070" y2="470" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  
  <rect x="750" y="465" width="160" height="40" rx="10" fill="#0b1628" stroke="#22c55e" stroke-width="1" opacity="0.7"/>
  <text x="830" y="490" text-anchor="middle" fill="#86efac" font-size="12">就地保护（保护区）</text>
  
  <rect x="880" y="465" width="140" height="40" rx="10" fill="#0b1628" stroke="#22c55e" stroke-width="1" opacity="0.7"/>
  <text x="950" y="490" text-anchor="middle" fill="#86efac" font-size="12">迁地保护</text>
  
  <rect x="1000" y="465" width="140" height="40" rx="10" fill="#0b1628" stroke="#22c55e" stroke-width="1" opacity="0.7"/>
  <text x="1070" y="490" text-anchor="middle" fill="#86efac" font-size="12">法律保护</text>
  
  <!-- Bottom connection: Relationship arrow -->
  <path d="M 400 510 Q 600 580 800 510" stroke="url(#brandGrad)" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="6,4"/>
  <text x="600" y="570" text-anchor="middle" fill="#9fb4cc" font-size="14">认识价值 → 识别威胁 → 采取行动</text>
  
  <!-- Legend -->
  <rect x="400" y="610" width="400" height="50" rx="12" fill="#14233a" opacity="0.6" stroke="#25415f" stroke-width="1"/>
  <circle cx="440" cy="635" r="6" fill="#38bdf8"/>
  <text x="455" y="640" fill="#9fb4cc" font-size="12">层次</text>
  <circle cx="530" cy="635" r="6" fill="#a78bfa"/>
  <text x="545" y="640" fill="#9fb4cc" font-size="12">价值</text>
  <circle cx="610" cy="635" r="6" fill="#f59e0b"/>
  <text x="625" y="640" fill="#9fb4cc" font-size="12">威胁</text>
  <circle cx="690" cy="635" r="6" fill="#22c55e"/>
  <text x="705" y="640" fill="#9fb4cc" font-size="12">保护</text>
</svg>
