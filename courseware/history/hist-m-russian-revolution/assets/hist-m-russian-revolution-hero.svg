<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#922b21" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980b9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a5276" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d35400" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#922b21" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e8449" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#145a32" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- 五角星装饰 -->
  <text x="640" y="80" font-size="48" text-anchor="middle" fill="#e74c3c" opacity="0.6">★</text>

  <!-- 主标题 -->
  <text x="640" y="130" font-size="52" font-weight="bold" text-anchor="middle" fill="#ffffff" font-family="'Noto Sans SC', 'PingFang SC', SimHei, sans-serif">俄国十月革命</text>
  <text x="640" y="170" font-size="22" text-anchor="middle" fill="#aaaacc" font-family="'Noto Sans SC', 'PingFang SC', SimHei, sans-serif">Russian October Revolution · 1917</text>

  <!-- 时间线箭头 -->
  <line x1="120" y1="230" x2="1160" y2="230" stroke="#e74c3c" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="1160,223 1175,230 1160,237" fill="#e74c3c"/>
  <text x="120" y="220" font-size="16" fill="#e74c3c">1905年革命</text>
  <text x="520" y="220" font-size="16" fill="#e74c3c">1914年一战爆发</text>
  <text x="830" y="220" font-size="16" fill="#e74c3c">1917年十月革命</text>

  <!-- 4张知识卡片 -->
  <!-- 卡片1：背景条件 -->
  <rect x="60" y="260" width="260" height="180" rx="16" fill="url(#card1)"/>
  <text x="190" y="300" font-size="26" font-weight="bold" text-anchor="middle" fill="#fff">① 革命背景</text>
  <text x="190" y="330" font-size="16" text-anchor="middle" fill="#fdd">沙皇专制</text>
  <text x="190" y="355" font-size="16" text-anchor="middle" fill="#fdd">一战危机</text>
  <text x="190" y="380" font-size="16" text-anchor="middle" fill="#fdd">工农矛盾激化</text>
  <text x="190" y="415" font-size="13" text-anchor="middle" fill="#f99">社会矛盾爆发前提</text>

  <!-- 卡片2：革命经过 -->
  <rect x="360" y="260" width="260" height="180" rx="16" fill="url(#card2)"/>
  <text x="490" y="300" font-size="26" font-weight="bold" text-anchor="middle" fill="#fff">② 革命经过</text>
  <text x="490" y="330" font-size="16" text-anchor="middle" fill="#ddf">二月革命推翻沙皇</text>
  <text x="490" y="355" font-size="16" text-anchor="middle" fill="#ddf">《四月提纲》</text>
  <text x="490" y="380" font-size="16" text-anchor="middle" fill="#ddf">十月武装起义</text>
  <text x="490" y="415" font-size="13" text-anchor="middle" fill="#99f">布尔什维克党领导</text>

  <!-- 卡片3：政权建立 -->
  <rect x="660" y="260" width="260" height="180" rx="16" fill="url(#card3)"/>
  <text x="790" y="300" font-size="26" font-weight="bold" text-anchor="middle" fill="#fff">③ 苏维埃政权</text>
  <text x="790" y="330" font-size="16" text-anchor="middle" fill="#fedd">攻占冬宫</text>
  <text x="790" y="355" font-size="16" text-anchor="middle" fill="#fedd">人民委员会成立</text>
  <text x="790" y="380" font-size="16" text-anchor="middle" fill="#fedd">和平·土地·面包</text>
  <text x="790" y="415" font-size="13" text-anchor="middle" fill="#fc9">第一个社会主义国家</text>

  <!-- 卡片4：历史意义 -->
  <rect x="960" y="260" width="260" height="180" rx="16" fill="url(#card4)"/>
  <text x="1090" y="300" font-size="26" font-weight="bold" text-anchor="middle" fill="#fff">④ 历史意义</text>
  <text x="1090" y="330" font-size="16" text-anchor="middle" fill="#dfd">打破资本主义格局</text>
  <text x="1090" y="355" font-size="16" text-anchor="middle" fill="#dfd">社会主义运动兴起</text>
  <text x="1090" y="380" font-size="16" text-anchor="middle" fill="#dfd">民族解放运动发展</text>
  <text x="1090" y="415" font-size="13" text-anchor="middle" fill="#9f9">世界历史新纪元</text>

  <!-- 连接箭头 -->
  <line x1="320" y1="350" x2="360" y2="350" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="355,344 370,350 355,356" fill="#ffffff"/>
  <line x1="620" y1="350" x2="660" y2="350" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="655,344 670,350 655,356" fill="#ffffff"/>
  <line x1="920" y1="350" x2="960" y2="350" stroke="#ffffff" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="955,344 970,350 955,356" fill="#ffffff"/>

  <!-- 底部核心结论 -->
  <rect x="200" y="480" width="880" height="70" rx="12" fill="#ffffff" fill-opacity="0.08" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="640" y="510" font-size="18" text-anchor="middle" fill="#ffffff">核心主线：一战危机 → 社会矛盾激化 → 布党领导武装起义 → 苏维埃政权建立 → 世界历史转折</text>
  <text x="640" y="538" font-size="15" text-anchor="middle" fill="#ccccee">人类历史上第一次成功的社会主义革命 | 1917.11.7 彼得格勒</text>

  <!-- 关键人物 -->
  <text x="640" y="630" font-size="17" text-anchor="middle" fill="#e74c3c">关键人物：列宁（布党领袖）· 托洛茨基（军委主席）· 尼古拉二世（末代沙皇）</text>

  <!-- 底部署名 -->
  <text x="640" y="690" font-size="13" text-anchor="middle" fill="#555577">TeachAny · 初中历史 · 9年级 · hist-m-russian-revolution</text>
</svg>