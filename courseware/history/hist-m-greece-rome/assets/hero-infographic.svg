<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Helvetica Neue',sans-serif">
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#e8a020"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="gRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- 装饰线条 -->
  <line x1="0" y1="60" x2="900" y2="60" stroke="#ffffff10" stroke-width="1"/>
  <line x1="0" y1="440" x2="900" y2="440" stroke="#ffffff10" stroke-width="1"/>

  <!-- 标题 -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="bold" fill="#f5c842" filter="url(#glow)">古希腊与古罗马文明</text>
  <text x="450" y="56" text-anchor="middle" font-size="11" fill="#94a3b8">Ancient Greece &amp; Rome · 初中历史 九年级上册</text>

  <!-- 中心节点 -->
  <ellipse cx="450" cy="250" rx="62" ry="36" fill="#0f172a" stroke="#f5c842" stroke-width="2"/>
  <text x="450" y="246" text-anchor="middle" font-size="13" font-weight="bold" fill="#f5c842">西方文明</text>
  <text x="450" y="263" text-anchor="middle" font-size="11" fill="#94a3b8">源头</text>

  <!-- 连接线：中心 → 古希腊 -->
  <line x1="390" y1="240" x2="240" y2="180" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- 连接线：中心 → 古罗马 -->
  <line x1="510" y1="240" x2="660" y2="180" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <!-- 连接线：古希腊 → 民主 -->
  <line x1="185" y1="155" x2="120" y2="105" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <!-- 连接线：古希腊 → 哲学 -->
  <line x1="170" y1="175" x2="95" y2="210" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <!-- 连接线：古希腊 → 奥运 -->
  <line x1="185" y1="195" x2="120" y2="265" stroke="#6366f1" stroke-width="1.2" opacity="0.6"/>
  <!-- 连接线：古罗马 → 共和 -->
  <line x1="715" y1="155" x2="780" y2="105" stroke="#f97316" stroke-width="1.2" opacity="0.6"/>
  <!-- 连接线：古罗马 → 法律 -->
  <line x1="730" y1="175" x2="805" y2="210" stroke="#f97316" stroke-width="1.2" opacity="0.6"/>
  <!-- 连接线：古罗马 → 帝国 -->
  <line x1="715" y1="195" x2="780" y2="265" stroke="#f97316" stroke-width="1.2" opacity="0.6"/>
  <!-- 底部连接 -->
  <line x1="420" y1="286" x2="320" y2="360" stroke="#22d3ee" stroke-width="1.2" opacity="0.6"/>
  <line x1="450" y1="286" x2="450" y2="360" stroke="#22d3ee" stroke-width="1.2" opacity="0.6"/>
  <line x1="480" y1="286" x2="580" y2="360" stroke="#22d3ee" stroke-width="1.2" opacity="0.6"/>

  <!-- 古希腊节点 -->
  <rect x="160" y="148" rx="10" ry="10" width="100" height="44" fill="url(#gPurple)" opacity="0.9"/>
  <text x="210" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🏛 古希腊</text>
  <text x="210" y="183" text-anchor="middle" font-size="10" fill="#e9d5ff">城邦文明</text>

  <!-- 古罗马节点 -->
  <rect x="640" y="148" rx="10" ry="10" width="100" height="44" fill="url(#gRed)" opacity="0.9"/>
  <text x="690" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🦅 古罗马</text>
  <text x="690" y="183" text-anchor="middle" font-size="10" fill="#fecaca">共和→帝国</text>

  <!-- 希腊子节点 -->
  <rect x="62" y="78" rx="8" ry="8" width="88" height="34" fill="#312e81" opacity="0.85"/>
  <text x="106" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#c7d2fe">⚖️ 民主政治</text>
  <text x="106" y="106" text-anchor="middle" font-size="9" fill="#a5b4fc">雅典直接民主</text>

  <rect x="42" y="188" rx="8" ry="8" width="88" height="34" fill="#312e81" opacity="0.85"/>
  <text x="86" y="203" text-anchor="middle" font-size="11" font-weight="bold" fill="#c7d2fe">🧠 哲学科学</text>
  <text x="86" y="216" text-anchor="middle" font-size="9" fill="#a5b4fc">苏/柏/亚里士多德</text>

  <rect x="62" y="248" rx="8" ry="8" width="88" height="34" fill="#312e81" opacity="0.85"/>
  <text x="106" y="263" text-anchor="middle" font-size="11" font-weight="bold" fill="#c7d2fe">🏅 奥运竞技</text>
  <text x="106" y="276" text-anchor="middle" font-size="9" fill="#a5b4fc">公元前776年</text>

  <!-- 罗马子节点 -->
  <rect x="750" y="78" rx="8" ry="8" width="88" height="34" fill="#7f1d1d" opacity="0.85"/>
  <text x="794" y="93" text-anchor="middle" font-size="11" font-weight="bold" fill="#fecaca">🏛 共和制度</text>
  <text x="794" y="106" text-anchor="middle" font-size="9" fill="#fca5a5">元老院 执政官</text>

  <rect x="770" y="188" rx="8" ry="8" width="88" height="34" fill="#7f1d1d" opacity="0.85"/>
  <text x="814" y="203" text-anchor="middle" font-size="11" font-weight="bold" fill="#fecaca">📜 罗马法</text>
  <text x="814" y="216" text-anchor="middle" font-size="9" fill="#fca5a5">十二铜表法</text>

  <rect x="750" y="248" rx="8" ry="8" width="88" height="34" fill="#7f1d1d" opacity="0.85"/>
  <text x="794" y="263" text-anchor="middle" font-size="11" font-weight="bold" fill="#fecaca">👑 罗马帝国</text>
  <text x="794" y="276" text-anchor="middle" font-size="9" fill="#fca5a5">屋大维 地中海</text>

  <!-- 底部影响节点 -->
  <rect x="265" y="358" rx="8" ry="8" width="96" height="34" fill="#134e4a" opacity="0.9"/>
  <text x="313" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#6ee7b7">🌍 地中海扩张</text>
  <text x="313" y="386" text-anchor="middle" font-size="9" fill="#a7f3d0">亚历山大东征</text>

  <rect x="402" y="358" rx="8" ry="8" width="96" height="34" fill="#134e4a" opacity="0.9"/>
  <text x="450" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#6ee7b7">✝ 基督教兴起</text>
  <text x="450" y="386" text-anchor="middle" font-size="9" fill="#a7f3d0">帝国晚期国教</text>

  <rect x="539" y="358" rx="8" ry="8" width="96" height="34" fill="#134e4a" opacity="0.9"/>
  <text x="587" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#6ee7b7">🎭 文艺遗产</text>
  <text x="587" y="386" text-anchor="middle" font-size="9" fill="#a7f3d0">文艺复兴源头</text>

  <!-- 时间轴 -->
  <line x1="100" y1="458" x2="800" y2="458" stroke="#334155" stroke-width="2"/>
  <circle cx="160" cy="458" r="4" fill="#a855f7"/>
  <text x="160" y="473" text-anchor="middle" font-size="9" fill="#94a3b8">前8世纪</text>
  <text x="160" y="483" text-anchor="middle" font-size="8" fill="#64748b">城邦兴起</text>
  <circle cx="280" cy="458" r="4" fill="#a855f7"/>
  <text x="280" y="473" text-anchor="middle" font-size="9" fill="#94a3b8">前5世纪</text>
  <text x="280" y="483" text-anchor="middle" font-size="8" fill="#64748b">雅典民主</text>
  <circle cx="400" cy="458" r="4" fill="#f5c842"/>
  <text x="400" y="473" text-anchor="middle" font-size="9" fill="#94a3b8">前4世纪</text>
  <text x="400" y="483" text-anchor="middle" font-size="8" fill="#64748b">亚历山大</text>
  <circle cx="520" cy="458" r="4" fill="#ef4444"/>
  <text x="520" y="473" text-anchor="middle" font-size="9" fill="#94a3b8">前509年</text>
  <text x="520" y="483" text-anchor="middle" font-size="8" fill="#64748b">罗马共和</text>
  <circle cx="640" cy="458" r="4" fill="#ef4444"/>
  <text x="640" y="473" text-anchor="middle" font-size="9" fill="#94a3b8">前27年</text>
  <text x="640" y="483" text-anchor="middle" font-size="8" fill="#64748b">罗马帝国</text>
  <circle cx="760" cy="458" r="4" fill="#64748b"/>
  <text x="760" y="473" text-anchor="middle" font-size="9" fill="#94a3b8">476年</text>
  <text x="760" y="483" text-anchor="middle" font-size="8" fill="#64748b">西罗马亡</text>
</svg>
