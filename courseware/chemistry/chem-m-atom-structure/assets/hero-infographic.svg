<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Helvetica Neue',sans-serif">
  <defs>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&amp;display=swap");
    text { font-family: "Noto Sans SC", system-ui, -apple-system, sans-serif; }
  </style>
    <radialGradient id="bgGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </radialGradient>
    <radialGradient id="nucleus" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="480" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="450" y="34" text-anchor="middle" font-size="21" font-weight="bold" fill="#38bdf8" filter="url(#softglow)">原子的结构</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748b">Structure of Atom · 初中化学九年级上册</text>

  <!-- 中央原子模型（碳原子，6质子6中子，2+4电子层） -->
  <!-- 电子轨道 1 -->
  <ellipse cx="450" cy="270" rx="55" ry="20" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5" transform="rotate(-20,450,270)"/>
  <!-- 电子轨道 2 -->
  <ellipse cx="450" cy="270" rx="95" ry="35" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5" transform="rotate(30,450,270)"/>
  <!-- 电子轨道 3（外圈示意） -->
  <ellipse cx="450" cy="270" rx="130" ry="50" fill="none" stroke="#34d399" stroke-width="0.8" opacity="0.3" transform="rotate(60,450,270)"/>

  <!-- 核 -->
  <circle cx="450" cy="270" r="28" fill="url(#nucleus)" filter="url(#glow2)"/>
  <text x="450" y="265" text-anchor="middle" font-size="10" fill="white" font-weight="bold">质子</text>
  <text x="450" y="278" text-anchor="middle" font-size="9" fill="#ffd6c0">中子</text>

  <!-- 第一层电子 (2个) -->
  <circle cx="407" cy="257" r="5" fill="#38bdf8" filter="url(#softglow)"/>
  <text x="407" y="249" text-anchor="middle" font-size="8" fill="#38bdf8">e⁻</text>
  <circle cx="493" cy="283" r="5" fill="#38bdf8" filter="url(#softglow)"/>
  <text x="493" y="275" text-anchor="middle" font-size="8" fill="#38bdf8">e⁻</text>

  <!-- 第二层电子 (4个) -->
  <circle cx="360" cy="248" r="5" fill="#a78bfa" filter="url(#softglow)"/>
  <text x="360" y="240" text-anchor="middle" font-size="8" fill="#a78bfa">e⁻</text>
  <circle cx="362" cy="298" r="5" fill="#a78bfa" filter="url(#softglow)"/>
  <text x="362" y="313" text-anchor="middle" font-size="8" fill="#a78bfa">e⁻</text>
  <circle cx="540" cy="248" r="5" fill="#a78bfa" filter="url(#softglow)"/>
  <text x="540" y="240" text-anchor="middle" font-size="8" fill="#a78bfa">e⁻</text>
  <circle cx="538" cy="298" r="5" fill="#a78bfa" filter="url(#softglow)"/>
  <text x="538" y="313" text-anchor="middle" font-size="8" fill="#a78bfa">e⁻</text>

  <!-- 标注原子模型为碳 -->
  <text x="450" y="348" text-anchor="middle" font-size="11" fill="#94a3b8">碳原子模型示意（6质子·6中子·6电子）</text>

  <!-- 左侧：原子核知识卡 -->
  <rect x="30" y="75" rx="10" ry="10" width="220" height="155" fill="#1e293b" stroke="#f97316" stroke-width="1.5" opacity="0.9"/>
  <text x="140" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#fb923c">⚛ 原子核</text>
  <line x1="50" y1="104" x2="230" y2="104" stroke="#f9731630" stroke-width="1"/>
  <text x="50" y="122" font-size="11" fill="#fdba74">质子（proton）</text>
  <text x="50" y="137" font-size="10" fill="#94a3b8">· 带正电，+1 电荷</text>
  <text x="50" y="151" font-size="10" fill="#94a3b8">· 决定元素种类</text>
  <text x="50" y="165" font-size="10" fill="#94a3b8">· 质子数 = 原子序数</text>
  <text x="50" y="185" font-size="11" fill="#fdba74">中子（neutron）</text>
  <text x="50" y="199" font-size="10" fill="#94a3b8">· 不带电</text>
  <text x="50" y="213" font-size="10" fill="#94a3b8">· 质子数+中子数=质量数</text>

  <!-- 左侧底：等量关系 -->
  <rect x="30" y="245" rx="10" ry="10" width="220" height="90" fill="#1e293b" stroke="#f5c842" stroke-width="1.5" opacity="0.9"/>
  <text x="140" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#fde047">🔢 核心等量关系</text>
  <line x1="50" y1="272" x2="230" y2="272" stroke="#f5c84230" stroke-width="1"/>
  <text x="50" y="290" font-size="11" fill="#fef08a">质子数 = 核电荷数</text>
  <text x="50" y="307" font-size="11" fill="#fef08a">= 核外电子数</text>
  <text x="50" y="323" font-size="11" fill="#fef08a">= 原子序数</text>

  <!-- 右侧：电子排布知识卡 -->
  <rect x="650" y="75" rx="10" ry="10" width="220" height="155" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5" opacity="0.9"/>
  <text x="760" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#c4b5fd">☁ 核外电子</text>
  <line x1="670" y1="104" x2="850" y2="104" stroke="#a78bfa30" stroke-width="1"/>
  <text x="670" y="122" font-size="11" fill="#c4b5fd">电子层（能层）</text>
  <text x="670" y="137" font-size="10" fill="#94a3b8">· 由内到外：第一、二、三…层</text>
  <text x="670" y="151" font-size="10" fill="#94a3b8">· 第一层最多 2 个</text>
  <text x="670" y="165" font-size="10" fill="#94a3b8">· 第二层最多 8 个</text>
  <text x="670" y="179" font-size="10" fill="#94a3b8">· 最外层最多 8 个</text>
  <text x="670" y="198" font-size="11" fill="#c4b5fd">最外层电子数</text>
  <text x="670" y="213" font-size="10" fill="#94a3b8">→ 决定元素化学性质</text>

  <!-- 右侧底：同位素 -->
  <rect x="650" y="245" rx="10" ry="10" width="220" height="90" fill="#1e293b" stroke="#34d399" stroke-width="1.5" opacity="0.9"/>
  <text x="760" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ee7b7">🔬 同位素概念</text>
  <line x1="670" y1="272" x2="850" y2="272" stroke="#34d39930" stroke-width="1"/>
<text x="670" y="290" font-size="10" fill="#a7f3d0">质子数相同、中子数不同</text>
  <text x="670" y="305" font-size="10" fill="#a7f3d0">的同种元素的原子</text>
  <text x="670" y="320" font-size="10" fill="#64748b">例：¹H、²H（氘）、³H（氚）</text>

  <!-- 顶部原子模型发展 -->
  <rect x="170" y="75" rx="10" ry="10" width="560" height="50" fill="#0f172a" stroke="#38bdf830" stroke-width="1"/>
  <text x="450" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#38bdf8">原子模型发展史</text>
  <text x="210" y="113" text-anchor="middle" font-size="9" fill="#64748b">道尔顿</text>
  <text x="210" y="123" text-anchor="middle" font-size="8" fill="#475569">实心球</text>
  <text x="290" y="113" text-anchor="middle" font-size="9" fill="#64748b">汤姆生</text>
  <text x="290" y="123" text-anchor="middle" font-size="8" fill="#475569">葡萄干蛋糕</text>
  <text x="380" y="113" text-anchor="middle" font-size="9" fill="#64748b">卢瑟福</text>
  <text x="380" y="123" text-anchor="middle" font-size="8" fill="#475569">行星轨道</text>
  <text x="470" y="113" text-anchor="middle" font-size="9" fill="#64748b">玻尔</text>
  <text x="470" y="123" text-anchor="middle" font-size="8" fill="#475569">能级轨道</text>
  <text x="560" y="113" text-anchor="middle" font-size="9" fill="#38bdf8">现代</text>
  <text x="560" y="123" text-anchor="middle" font-size="8" fill="#38bdf8">量子力学</text>
  <line x1="230" y1="117" x2="270" y2="117" stroke="#38bdf840" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="315" y1="117" x2="355" y2="117" stroke="#38bdf840" stroke-width="1"/>
  <line x1="400" y1="117" x2="450" y2="117" stroke="#38bdf840" stroke-width="1"/>
  <line x1="485" y1="117" x2="535" y2="117" stroke="#38bdf840" stroke-width="1"/>

  <!-- 底部：相对原子质量 -->
  <rect x="170" y="370" rx="10" ry="10" width="560" height="48" fill="#1e293b" stroke="#f5c84230" stroke-width="1"/>
  <text x="450" y="390" text-anchor="middle" font-size="11" font-weight="bold" fill="#fde047">相对原子质量 ≈ 质子数 + 中子数</text>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#94a3b8">（电子质量极小可忽略；以碳-12原子质量的1/12为标准）</text>

  <!-- 连接线：核卡→中央 -->
  <line x1="250" y1="150" x2="422" y2="265" stroke="#f9731640" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- 连接线：电子卡→中央 -->
  <line x1="650" y1="150" x2="478" y2="265" stroke="#a78bfa40" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
