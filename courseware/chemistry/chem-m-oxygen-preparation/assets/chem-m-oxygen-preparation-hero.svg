<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07111f"/>
      <stop offset="100%" style="stop-color:#0f2847"/>
    </linearGradient>
    <linearGradient id="flask-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00bfff;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="bubble-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4fc3f7;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#4fc3f7" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- === Left: Conical Flask (锥形瓶) === -->
  <g transform="translate(120, 100)">
    <!-- Flask body -->
    <path d="M 50,0 L 50,60 L 10,160 L 90,160 L 50,60 Z" 
          fill="url(#flask-grad)" stroke="#4fc3f7" stroke-width="1.5" opacity="0.8"/>
    <!-- Flask neck -->
    <rect x="42" y="-20" width="16" height="25" fill="none" stroke="#4fc3f7" stroke-width="1.5" rx="2"/>
    <!-- Liquid inside -->
    <path d="M 20,120 Q 50,130 80,120 L 85,155 Q 50,162 15,155 Z" 
          fill="#00bfff" opacity="0.3"/>
    <!-- Bubbles -->
    <circle cx="40" cy="110" r="4" fill="url(#bubble-grad)" filter="url(#glow)">
      <animate attributeName="cy" values="110;80;50" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="120" r="3" fill="url(#bubble-grad)" filter="url(#glow)">
      <animate attributeName="cy" values="120;85;55" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.4;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="130" r="2.5" fill="url(#bubble-grad)" filter="url(#glow)">
      <animate attributeName="cy" values="130;95;60" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.3;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Label -->
    <text x="50" y="190" text-anchor="middle" fill="#4fc3f7" font-size="11" font-family="system-ui" opacity="0.9">H₂O₂ + MnO₂</text>
  </g>

  <!-- === Center: Round-bottom Flask with Heating (加热装置) === -->
  <g transform="translate(330, 80)">
    <!-- Flask body (圆底烧瓶) -->
    <ellipse cx="70" cy="160" rx="45" ry="40" fill="url(#flask-grad)" stroke="#ff6b6b" stroke-width="1.5" opacity="0.8"/>
    <!-- Flask neck -->
    <path d="M 60,120 L 60,80 Q 60,70 65,70 L 75,70 Q 80,70 80,80 L 80,120" 
          fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <!-- Delivery tube -->
    <path d="M 80,75 L 140,75 L 140,130" fill="none" stroke="#4fc3f7" stroke-width="2" stroke-dasharray="4,2"/>
    <!-- Collection trough hint -->
    <rect x="120" y="130" width="40" height="25" rx="3" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="1" opacity="0.6"/>
    <text x="140" y="147" text-anchor="middle" fill="#4fc3f7" font-size="8" font-family="system-ui">O₂↑</text>
    <!-- Flame below -->
    <g transform="translate(70, 200)">
      <ellipse cx="0" cy="8" rx="12" ry="4" fill="#ff6b6b" opacity="0.3"/>
      <path d="M -5,5 Q -3,-8 0,-15 Q 3,-8 5,5 Z" fill="#ff6b6b" opacity="0.7">
        <animate attributeName="d" values="M -5,5 Q -3,-8 0,-15 Q 3,-8 5,5 Z;M -4,5 Q -2,-10 0,-18 Q 2,-10 4,5 Z;M -5,5 Q -3,-8 0,-15 Q 3,-8 5,5 Z" dur="0.8s" repeatCount="indefinite"/>
      </path>
      <path d="M -2,5 Q -1,-5 0,-10 Q 1,-5 2,5 Z" fill="#ffa726" opacity="0.9">
        <animate attributeName="d" values="M -2,5 Q -1,-5 0,-10 Q 1,-5 2,5 Z;M -2,5 Q -1,-6 0,-12 Q 1,-6 2,5 Z;M -2,5 Q -1,-5 0,-10 Q 1,-5 2,5 Z" dur="0.6s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Purple solid (KMnO₄) -->
    <ellipse cx="70" cy="170" rx="30" ry="10" fill="#9c27b0" opacity="0.4"/>
    <!-- Label -->
    <text x="70" y="240" text-anchor="middle" fill="#ff6b6b" font-size="11" font-family="system-ui" opacity="0.9">2KMnO₄ →加热→ K₂MnO₄</text>
    <text x="70" y="255" text-anchor="middle" fill="#ff6b6b" font-size="11" font-family="system-ui" opacity="0.7">+ MnO₂ + O₂↑</text>
  </g>

  <!-- === Right: O₂ molecule === -->
  <g transform="translate(600, 120)" filter="url(#glow-strong)">
    <!-- O₂ molecular model -->
    <circle cx="30" cy="80" r="28" fill="#1565c0" opacity="0.6" stroke="#42a5f5" stroke-width="2"/>
    <circle cx="80" cy="80" r="28" fill="#1565c0" opacity="0.6" stroke="#42a5f5" stroke-width="2"/>
    <!-- Bond -->
    <line x1="45" y1="75" x2="65" y2="75" stroke="#4fc3f7" stroke-width="3"/>
    <line x1="45" y1="85" x2="65" y2="85" stroke="#4fc3f7" stroke-width="3"/>
    <!-- Atom labels -->
    <text x="30" y="85" text-anchor="middle" fill="#e3f2fd" font-size="16" font-weight="bold" font-family="system-ui">O</text>
    <text x="80" y="85" text-anchor="middle" fill="#e3f2fd" font-size="16" font-weight="bold" font-family="system-ui">O</text>
    <!-- O₂ label -->
    <text x="55" y="130" text-anchor="middle" fill="#4fc3f7" font-size="14" font-family="system-ui" font-weight="bold">O₂</text>
    <!-- Floating animation -->
    <animateTransform attributeName="transform" type="translate" values="600,120;600,110;600,120" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- === Title === -->
  <text x="400" y="45" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="bold" font-family="system-ui" filter="url(#glow)">氧气的制取</text>
  <text x="400" y="72" text-anchor="middle" fill="#4fc3f7" font-size="14" font-family="system-ui" opacity="0.8">Preparation of Oxygen in Laboratory</text>

  <!-- === Bottom: Three method cards === -->
  <g transform="translate(50, 340)">
    <!-- Card 1 -->
    <rect x="0" y="0" width="210" height="70" rx="8" fill="#14233a" stroke="#4fc3f7" stroke-width="1" opacity="0.9"/>
    <circle cx="25" cy="35" r="14" fill="#00bcd4" opacity="0.3"/>
    <text x="25" y="40" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="bold" font-family="system-ui">1</text>
    <text x="50" y="25" fill="#e0f7fa" font-size="11" font-family="system-ui">过氧化氢分解法</text>
    <text x="50" y="43" fill="#80deea" font-size="9" font-family="system-ui" opacity="0.8">H₂O₂ —MnO₂催化→ H₂O + O₂↑</text>
    <text x="50" y="58" fill="#4fc3f7" font-size="9" font-family="system-ui" opacity="0.6">常温 · 无需加热 · 最常用</text>

    <!-- Card 2 -->
    <rect x="230" y="0" width="210" height="70" rx="8" fill="#14233a" stroke="#ff6b6b" stroke-width="1" opacity="0.9"/>
    <circle cx="255" cy="35" r="14" fill="#ff6b6b" opacity="0.3"/>
    <text x="255" y="40" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold" font-family="system-ui">2</text>
    <text x="280" y="25" fill="#ffcdd2" font-size="11" font-family="system-ui">高锰酸钾加热法</text>
    <text x="280" y="43" fill="#ef9a9a" font-size="9" font-family="system-ui" opacity="0.8">2KMnO₄ —加热→ K₂MnO₄+MnO₂+O₂↑</text>
    <text x="280" y="58" fill="#ff6b6b" font-size="9" font-family="system-ui" opacity="0.6">需加热 · 管口放棉花</text>

    <!-- Card 3 -->
    <rect x="460" y="0" width="210" height="70" rx="8" fill="#14233a" stroke="#66bb6a" stroke-width="1" opacity="0.9"/>
    <circle cx="485" cy="35" r="14" fill="#66bb6a" opacity="0.3"/>
    <text x="485" y="40" text-anchor="middle" fill="#66bb6a" font-size="14" font-weight="bold" font-family="system-ui">3</text>
    <text x="510" y="25" fill="#c8e6c9" font-size="11" font-family="system-ui">氯酸钾加热法</text>
    <text x="510" y="43" fill="#a5d6a7" font-size="9" font-family="system-ui" opacity="0.8">2KClO₃ —MnO₂+加热→ 2KCl+3O₂↑</text>
    <text x="510" y="58" fill="#66bb6a" font-size="9" font-family="system-ui" opacity="0.6">催化剂+加热 · 产量高</text>
  </g>

  <!-- === Decorative elements === -->
  <!-- Floating particles -->
  <circle cx="720" cy="250" r="2" fill="#4fc3f7" opacity="0.5">
    <animate attributeName="cy" values="250;230;250" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="280" r="1.5" fill="#4fc3f7" opacity="0.4">
    <animate attributeName="cy" values="280;260;280" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="690" cy="300" r="1.8" fill="#4fc3f7" opacity="0.3">
    <animate attributeName="cy" values="300;285;300" dur="5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- TeachAny badge -->
  <text x="750" y="435" text-anchor="end" fill="#4fc3f7" font-size="9" font-family="system-ui" opacity="0.5">TeachAny · 初中化学</text>
</svg>
