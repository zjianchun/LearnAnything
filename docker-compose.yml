services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./courseware:/app/courseware
      - db_data:/app/db
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.minimax.chat/v1}
    networks:
      - app

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./courseware:/var/www/courseware:ro
      - ./data:/var/www/data:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app

volumes:
  db_data:

networks:
  app:
